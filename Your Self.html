    <style>
        * { box-sizing: border-box; }
        body { margin: 0;

        .header {

        .header h1 {

            font-size: 50px;
            color: #ad1457;
            
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            padding: 0px 100px 100px;
        }

        .column {
            flex: 25%;
            max-width: 25%;
        }

        .img-hover-zoom {
            overflow: hidden;
            border: 2px solid #ffffff;
            margin: 5px;
            border-radius: 15px;
            cursor: pointer;
        }

        .img-hover-zoom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            
        }

        .img-hover-zoom:hover img {
            transform: scale(1.2);
        }

        /* LIGHTBOX POPUP */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .lightbox img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
            transform: scale(0.7);
            transition: 0.3s;
        }

        .lightbox.active {
            visibility: visible;
            opacity: 1;
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: rgb(255, 255, 255);
            cursor: pointer;
        }

        /* Responsive */
        @media screen and (max-width: 800px) {
            .column {
                flex: 50%;
                max-width: 50%;
            }
        }

        @media screen and (max-width: 500px) {
            .column {

                max-width: 100%;
            }
        }
    </style>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img">
</div>

<script>
let images = [];
let currentIndex = 0;

// Collect all images
document.querySelectorAll(".img-hover-zoom img").forEach((img, index) => {
    images.push(img.src);

    img.addEventListener("click", () => {
        openLightbox(index);
    });
});

function openLightbox(index) {
    currentIndex = index;
    document.getElementById("lightbox-img").src = images[currentIndex];
    document.getElementById("lightbox").classList.add("active");
}

function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
}

function changeImage(direction) {
    currentIndex += direction;

    if (currentIndex < 0) currentIndex = images.length - 1;
    if (currentIndex >= images.length) currentIndex = 0;

    document.getElementById("lightbox-img").src = images[currentIndex];
}

// Keyboard controls
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") changeImage(1);
    if (e.key === "ArrowLeft") changeImage(-1);
    if (e.key === "Escape") closeLightbox();
});
</script>
