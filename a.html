<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popup with Image</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    /* Overlay */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* Popup box */
    .popup {
      background: #fff;
      padding: 20px;
      width: 320px;
      border-radius: 12px;
      text-align: center;
      position: relative;
      transform: scale(0.7);
      transition: transform 0.4s ease;
    }

    /* Image inside popup */
    .popup img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    /* Close button */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
    }

    /* Active state (animation trigger) */
    .popup-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .popup-overlay.active .popup {
      transform: scale(1);
    }
  </style>
</head>
<body>

  <h1>My Website</h1>

  <!-- Popup -->
  <div class="popup-overlay" id="popup">
    <div class="popup">
      <span class="close-btn" onclick="closePopup()">&times;</span>

      <!-- Image -->
      <img src="C:\Users\Mahesh\Downloads\Navya\Navya\1.jpeg" alt="Popup Image">
    </div>
  </div>

  <script>
    // Show popup on load
    window.onload = function() {
      setTimeout(() => {
        document.getElementById("popup").classList.add("active");
      }, 500); // slight delay for smoother effect
    };

    // Close popup
    function closePopup() {
      document.getElementById("popup").classList.remove("active");
    }
  </script>

</body>
</html>
