<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pop Animation Blocks</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffe4ec;
}

/* Layout */
main {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* BLOCK STYLE + ANIMATION */
.block {
  background: white;
  padding: 30px;
  text-align: center;
  border-radius: 15px;
  cursor: pointer;

  /* Animation start state */
  opacity: 0;
  transform: scale(0.5);

  /* Animation */
  animation: popUp 0.6s ease forwards;
}

/* Stagger (one by one pop) */
.block:nth-child(1) { animation-delay: 0.2s; }
.block:nth-child(2) { animation-delay: 0.4s; }
.block:nth-child(3) { animation-delay: 0.6s; }
.block:nth-child(4) { animation-delay: 0.8s; }

/* KEYFRAMES */
@keyframes popUp {
  0% {
    opacity: 0;
    transform: scale(0.5) translateY(40px);
  }
  70% {
    transform: scale(1.1);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}
</style>

</head>

<body>

<main>
  <div class="block">Block 1</div>
  <div class="block">Block 2</div>
  <div class="block">Block 3</div>
  <div class="block">Block 4</div>
</main>

</body>
</html>
